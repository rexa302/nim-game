<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GenLayer Nim Matchsticks</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:
    radial-gradient(circle at top,#1b1b40 0%,#080811 70%);

  font-family:Arial,sans-serif;
  color:white;
  overflow:hidden;
}

.container{
  width:100%;
  max-width:950px;
  text-align:center;
  padding:30px;
  position:relative;
}

h1{
  font-size:52px;
  margin-bottom:10px;
  text-shadow:0 0 18px #00ffe0;
}

.subtitle{
  color:#9effef;
  margin-bottom:40px;
}

.board{
  display:flex;
  flex-direction:column;
  gap:30px;
  margin-top:20px;
}

.row{
  display:flex;
  justify-content:center;
  gap:12px;
  min-height:100px;
}

/* Matchstick */

.match{
  width:22px;
  height:90px;

  border-radius:12px;

  background:
    linear-gradient(to bottom,
      #ff4d00 0%,
      #ffb347 15%,
      #f5deb3 16%,
      #caa472 100%);

  box-shadow:
    0 0 12px rgba(255,120,0,.5);

  position:relative;

  cursor:pointer;

  transition:.25s;
}

.match:hover{
  transform:translateY(-8px);
}

.match::before{
  content:"";

  position:absolute;
  top:-8px;
  left:50%;

  transform:translateX(-50%);

  width:18px;
  height:18px;

  background:#ff4500;

  border-radius:50%;

  box-shadow:
    0 0 12px #ff6600,
    0 0 25px #ff3300;
}

.selected{
  transform:translateY(-18px);
  filter:brightness(1.4);
}

.controls{
  margin-top:35px;
}

.main-btn{
  padding:16px 45px;

  border:none;
  border-radius:50px;

  background:
    linear-gradient(45deg,#ff008c,#00ffe0);

  color:white;

  font-size:22px;
  font-weight:bold;

  cursor:pointer;

  transition:.25s;

  box-shadow:
    0 0 20px rgba(0,255,224,.35);
}

.main-btn:hover{
  transform:scale(1.05);
}

.main-btn:disabled{
  opacity:.4;
  cursor:not-allowed;
}

.info{
  margin-top:30px;
  font-size:28px;
  color:#00ffe0;
  min-height:40px;
}

.turn{
  font-size:22px;
  color:#ff9adf;
  margin-bottom:10px;
}

.rules{
  margin-top:20px;
  color:#b8b8d0;
  font-size:15px;
}

/* Corner Buttons */

.corner-buttons{
  position:fixed;
  top:20px;
  right:20px;

  display:flex;
  gap:12px;
  z-index:100;
}

.corner-btn{
  border:none;
  border-radius:40px;
  padding:12px 20px;

  font-size:14px;
  font-weight:bold;

  cursor:pointer;

  color:white;

  background:
    linear-gradient(135deg,#171730,#2f2f6b);

  box-shadow:
    0 0 15px rgba(0,255,224,.25);

  transition:.25s;
}

.corner-btn:hover{
  transform:translateY(-3px) scale(1.04);

  background:
    linear-gradient(135deg,#00ffe0,#ff008c);
}

/* Winner Animation */

.win-glow{
  animation:glow 1s infinite alternate;
}

@keyframes glow{

  from{
    text-shadow:0 0 10px #00ffe0;
  }

  to{
    text-shadow:
      0 0 20px #00ffe0,
      0 0 35px #ff00aa;
  }

}

@media(max-width:700px){

  h1{
    font-size:36px;
  }

  .match{
    width:16px;
    height:72px;
  }

  .corner-buttons{
    top:12px;
    right:12px;
    flex-direction:column;
  }

}

</style>
</head>

<body>

<!-- Corner Buttons -->

<div class="corner-buttons">

  <button class="corner-btn" onclick="newGame()">
    🎮 NEW GAME
  </button>

  <button class="corner-btn" onclick="restartGame()">
    🔄 RESTART
  </button>

</div>

<div class="container">

  <h1 class="win-glow">🔥 GenLayer Nim</h1>

  <div class="subtitle">
    Take matches wisely. Last move wins.
  </div>

  <div class="turn" id="turn">
    Your Turn
  </div>

  <div class="board" id="board"></div>

  <div class="controls">

    <button
      id="takeBtn"
      class="main-btn"
      onclick="confirmMove()"
      disabled>

      TAKE MATCHES

    </button>

  </div>

  <div class="info" id="info"></div>

  <div class="rules">
    Select matchsticks from ONLY one row.
  </div>

</div>

<script>

let rows = [1,3,5,7];

let selected = [];

let selectedRow = null;

let gameOver = false;

const board = document.getElementById("board");
const info = document.getElementById("info");
const turnEl = document.getElementById("turn");
const takeBtn = document.getElementById("takeBtn");

function renderBoard(){

  board.innerHTML = "";

  rows.forEach((count,rowIndex)=>{

    const row = document.createElement("div");

    row.className = "row";

    for(let i=0;i<count;i++){

      const match = document.createElement("div");

      match.className = "match";

      if(
        selected.some(
          s => s.row === rowIndex && s.index === i
        )
      ){
        match.classList.add("selected");
      }

      match.onclick = () => selectMatch(rowIndex,i);

      row.appendChild(match);

    }

    board.appendChild(row);

  });

}

function selectMatch(row,index){

  if(gameOver) return;

  if(selectedRow !== null && selectedRow !== row){
    return;
  }

  selectedRow = row;

  const existing =
    selected.findIndex(
      s => s.row === row && s.index === index
    );

  if(existing >= 0){

    selected.splice(existing,1);

    if(selected.length === 0){
      selectedRow = null;
    }

  }else{

    selected.push({row,index});

  }

  renderBoard();

  takeBtn.disabled = selected.length === 0;

}

async function confirmMove(){

  if(selected.length === 0) return;

  turnEl.textContent = "Removing Matches...";

  selected.sort((a,b)=>b.index-a.index);

  for(const s of selected){

    rows[s.row]--;

    renderBoard();

    await delay(350);

  }

  selected = [];
  selectedRow = null;

  takeBtn.disabled = true;

  checkWinner("You");

  if(gameOver) return;

  turnEl.textContent = "AI Thinking...";

  setTimeout(aiMove,1200);

}

async function aiMove(){

  let nimSum =
    rows[0] ^ rows[1] ^ rows[2] ^ rows[3];

  let row = -1;
  let target = -1;

  for(let i=0;i<rows.length;i++){

    let t = rows[i] ^ nimSum;

    if(t < rows[i]){

      row = i;
      target = t;

      break;

    }

  }

  if(row === -1){

    for(let i=0;i<rows.length;i++){

      if(rows[i] > 0){

        row = i;
        target = rows[i]-1;

        break;

      }

    }

  }

  let removeCount =
    rows[row] - target;

  for(let i=0;i<removeCount;i++){

    rows[row]--;

    renderBoard();

    await delay(450);

  }

  checkWinner("AI");

  if(!gameOver){

    turnEl.textContent = "Your Turn";

  }

}

function checkWinner(player){

  const total =
    rows.reduce((a,b)=>a+b,0);

  if(total === 0){

    gameOver = true;

    turnEl.textContent = "";

    if(player === "You"){

      info.innerHTML =
        "🎉 YOU WIN";

    }else{

      info.innerHTML =
        "🤖 AI WINS";

    }

  }

}

function restartGame(){

  rows = [1,3,5,7];

  selected = [];

  selectedRow = null;

  gameOver = false;

  info.innerHTML = "";

  turnEl.textContent = "Your Turn";

  takeBtn.disabled = true;

  renderBoard();

}

function newGame(){

  restartGame();

}

function delay(ms){

  return new Promise(
    resolve => setTimeout(resolve,ms)
  );

}

renderBoard();

</script>

</body>
</html>
