<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Nim Deluxe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#1b1b40,#080811 70%);
color:white;min-height:100vh;overflow:hidden
}
.bg{
position:fixed;inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,255,255,.15),transparent 25%),
radial-gradient(circle at 80% 30%,rgba(255,0,140,.15),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(0,255,150,.1),transparent 25%);
animation:float 8s infinite alternate;
}
@keyframes float{from{transform:translateY(-10px)}to{transform:translateY(10px)}}
.screen,.game{position:relative;z-index:2}
.screen{
display:flex;flex-direction:column;justify-content:center;align-items:center;
height:100vh;text-align:center
}
.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:40px;border-radius:30px;
box-shadow:0 0 30px rgba(0,255,255,.2)
}
h1{font-size:56px;margin-bottom:15px}
.btn{
border:none;padding:15px 30px;border-radius:999px;
cursor:pointer;margin:10px;font-size:18px;font-weight:bold;
background:linear-gradient(45deg,#ff008c,#00ffe0);color:#fff
}
.game{display:none;padding:20px;text-align:center}
.row{display:flex;justify-content:center;gap:10px;margin:25px}
.match{
width:22px;height:90px;border-radius:10px;cursor:pointer;
background:linear-gradient(#ff6a00,#ffd28a 18%,#c79c62);
box-shadow:0 0 12px orange;position:relative
}
.match:before{
content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);
width:16px;height:16px;border-radius:50%;background:#ff4500;
box-shadow:0 0 15px #ff4500
}
.selected{transform:translateY(-15px);filter:brightness(1.4)}
#info{font-size:28px;margin-top:20px;color:#00ffe0}
.badge{
display:inline-block;padding:8px 16px;border-radius:20px;
background:#111;margin-bottom:15px
}
.modal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
justify-content:center;align-items:center;z-index:99
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="screen" id="menu">
<div class="card">
<h1>🔥 Neon Nim</h1>
<p style="margin-bottom:20px">Choose Difficulty</p>
<button class="btn" onclick="startGame('easy')">🟢 EASY</button><br>
<button class="btn" onclick="startGame('medium')">🟡 MEDIUM</button><br>
<button class="btn" onclick="startGame('hard')">🔴 HARD</button>
</div>
</div>

<div class="game" id="game">
<div class="badge" id="badge"></div>
<h1 style="font-size:42px">🔥 Neon Nim</h1>
<div id="turn">Your Turn</div>
<div id="board"></div>
<button class="btn" id="takeBtn" onclick="confirmMove()" disabled>TAKE MATCHES</button>
<div id="info"></div>
<br>
<button class="btn" onclick="restartGame()">RESTART</button>
</div>

<div class="modal" id="modal">
<div class="card">
<h1 id="winnerText"></h1>
<button class="btn" onclick="closeModal()">PLAY AGAIN</button>
</div>
</div>

<script>
let rows=[1,3,5,7],selected=[],selectedRow=null,gameOver=false,difficulty='hard';
const board=document.getElementById('board');
const turnEl=document.getElementById('turn');
const takeBtn=document.getElementById('takeBtn');

function beep(freq=500,dur=120){
const a=new(window.AudioContext||window.webkitAudioContext)();
const o=a.createOscillator();const g=a.createGain();
o.connect(g);g.connect(a.destination);
o.frequency.value=freq;o.start();
g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+dur/1000);
o.stop(a.currentTime+dur/1000);
}

function startGame(level){
difficulty=level;
document.getElementById('badge').innerText='Difficulty: '+level.toUpperCase();
document.getElementById('menu').style.display='none';
document.getElementById('game').style.display='block';
restartGame();
}

function renderBoard(){
board.innerHTML='';
rows.forEach((count,rowIndex)=>{
const row=document.createElement('div');
row.className='row';
for(let i=0;i<count;i++){
const m=document.createElement('div');
m.className='match';
if(selected.some(s=>s.row===rowIndex&&s.index===i))m.classList.add('selected');
m.onclick=()=>selectMatch(rowIndex,i);
row.appendChild(m);
}
board.appendChild(row);
});
}

function selectMatch(row,index){
if(gameOver)return;
if(selectedRow!==null&&selectedRow!==row)return;
selectedRow=row;
const ex=selected.findIndex(s=>s.row===row&&s.index===index);
if(ex>=0){selected.splice(ex,1);if(!selected.length)selectedRow=null;}
else selected.push({row,index});
takeBtn.disabled=!selected.length;
renderBoard();
}

async function confirmMove(){
beep(700,120);
selected.sort((a,b)=>b.index-a.index);
for(const s of selected){rows[s.row]--;renderBoard();await delay(200);}
selected=[];selectedRow=null;takeBtn.disabled=true;
if(checkWinner('You'))return;
turnEl.innerText='AI Thinking...';
setTimeout(aiMove,800);
}

async function aiMove(){
let random=difficulty==='easy'||(difficulty==='medium'&&Math.random()<0.35);
let row=-1,target=-1;

if(random){
let avail=rows.map((c,i)=>c>0?i:null).filter(v=>v!==null);
row=avail[Math.floor(Math.random()*avail.length)];
target=rows[row]-(Math.floor(Math.random()*rows[row])+1);
}else{
let nim=rows[0]^rows[1]^rows[2]^rows[3];
for(let i=0;i<rows.length;i++){
let t=rows[i]^nim;
if(t<rows[i]){row=i;target=t;break;}
}
if(row===-1){
for(let i=0;i<rows.length;i++) if(rows[i]>0){row=i;target=rows[i]-1;break;}
}
}
let remove=rows[row]-target;
for(let i=0;i<remove;i++){rows[row]--;renderBoard();beep(350,80);await delay(250);}
if(checkWinner('AI'))return;
turnEl.innerText='Your Turn';
}

function checkWinner(player){
if(rows.reduce((a,b)=>a+b,0)===0){
gameOver=true;
document.getElementById('winnerText').innerText=player==='You'?'🏆 YOU WIN':'🤖 AI WINS';
document.getElementById('modal').style.display='flex';
beep(player==='You'?900:250,500);
return true;
}
return false;
}

function closeModal(){document.getElementById('modal').style.display='none';restartGame();}
function restartGame(){
rows=[1,3,5,7];selected=[];selectedRow=null;gameOver=false;
turnEl.innerText='Your Turn';renderBoard();
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
</html>
